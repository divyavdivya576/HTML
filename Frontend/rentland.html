<!DOCTYPE html>
<html>
<head>
<title>Rent Land</title>

<style>

body{
    font-family:Arial;
    background:#F5F7F2;
}

.container{
    width:500px;
    margin:50px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

h2{
    color:#2E7D32;
    text-align:center;
}

input,select{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#2E7D32;
    color:white;
    border:none;
}

</style>

</head>

<body>

<div class="container">

<h2>🌾 Rent Agricultural Land</h2>

<form>

<input type="text" placeholder="Farmer Name">

<input type="text" placeholder="Contact Number">

<select>
<option>3 Months</option>
<option>6 Months</option>
<option>12 Months</option>
</select>

<button type="submit">Submit Request</button>

</form>

</div>

</body>
</html>
