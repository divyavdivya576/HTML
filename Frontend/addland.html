<html>
<head>
    <title>AgriConnect - Add Land</title>

```

</head>

<body>

<div class="header">
    <h1>🌾 AgriConnect</h1>
</div>

<div class="container">

```
<h2>Add New Land</h2>

<form id="landForm">

    <input type="text" id="owner" placeholder="Owner Name" required>

    <input type="text" id="location" placeholder="Location" required>

    <input type="number" id="acres" placeholder="Land Acres" required>

    <input type="number" id="cost" placeholder="Rent Cost" required>

    <input type="text" id="soilType" placeholder="Soil Type" required>

    <input type="text" id="waterAvailability" placeholder="Water Availability" required>

    <input type="text" id="contact" placeholder="Contact Number" required>

    <button type="submit">Add Land</button>

</form>
```

</div>

<script>

document.getElementById("landForm").addEventListener("submit", async function(e){

    e.preventDefault();

    console.log("Form Submitted");

    const landData = {

        owner: document.getElementById("owner").value,
        location: document.getElementById("location").value,
        acres: document.getElementById("acres").value,
        cost: document.getElementById("cost").value,
        soilType: document.getElementById("soilType").value,
        waterAvailability: document.getElementById("waterAvailability").value,
        contact: document.getElementById("contact").value

    };

    try {

        const response = await fetch("http://localhost:5000/addland", {

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body: JSON.stringify(landData)

        });

        const result = await response.json();

        alert(result.message);

    }
    catch(error){

        console.log(error);

        alert("Backend Connection Error");

    }

});

</script>

</body>
</html>
