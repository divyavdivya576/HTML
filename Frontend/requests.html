<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rental Requests</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f7f2;
    padding:20px;
}

h1{
    text-align:center;
    color:#1B5E20;
}

#requests{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
    margin-top:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

.card h3{
    color:#1B5E20;
}

.card p{
    margin:10px 0;
}

button{
    padding:10px 18px;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:5px;
    margin-right:10px;
}

.accept{
    background:green;
}

.reject{
    background:red;
}

</style>

</head>

<body>

<h1>Rental Requests</h1>

<div id="requests"></div>

<script>

const container = document.getElementById("requests");

loadRequests();
async function loadRequests(){

    try{

        const response = await fetch("http://localhost:5000/rentals");

        const data = await response.json();

        container.innerHTML = "";

        data.forEach((rental) => {

           container.innerHTML += `

<div class="card">

    <h3>${rental.farmerName}</h3>

    <p><b>Phone:</b> ${rental.phone}</p>

    <p><b>Email:</b> ${rental.email}</p>

    <p><b>Crop:</b> ${rental.crop}</p>

    <p><b>Duration:</b> ${rental.duration}</p>

    <p>
        <b>Status:</b>
        <span style="
            color:${rental.status === "Accepted"
                ? "green"
                : rental.status === "Rejected"
                ? "red"
                : "orange"};
            font-weight:bold;
        ">
            ${rental.status}
        </span>
    </p>

    ${
        rental.status === "Pending"
        ? `
        <button
            class="accept"
            onclick="updateStatus('${rental._id}','Accepted')">
            Accept
        </button>

        <button
            class="reject"
            onclick="updateStatus('${rental._id}','Rejected')">
            Reject
        </button>
        `
        : `
        <p style="color:green;font-weight:bold;">
            ✅ Decision Completed
        </p>
        `
    }

</div>

`;

        });

    }catch(error){

        console.log(error);

        alert("Unable to load rental requests.");

    }

}



       

async function updateStatus(id,status){

    try{

        const response = await fetch(`http://localhost:5000/rentals/${id}`,{

            method:"PUT",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                status:status
            })

        });

        const result = await response.json();

        alert(result.message);

        loadRequests();

    }
    catch(error){

        console.log(error);

        alert("Update Failed");

    }

}

</script>

</body>

</html>
