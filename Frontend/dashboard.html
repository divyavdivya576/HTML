<!DOCTYPE html>
<html>

<head>
<title>AgriConnect Dashboard</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#F5F7F2;
    margin:0;
    padding:0;
}

.header{
    background:#2E7D32;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    margin:auto;
    padding:20px;

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0px 3px 12px rgba(0,0,0,0.15);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:12px 12px 0 0;
}

.card-content{
    padding:15px;
}

.card h3{
    color:#1B5E20;
}

.btn{
    width:100%;
    padding:12px;
    background:#388E3C;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.btn:hover{
    background:#2E7D32;
}
.nav{
background:#1B5E20;
padding:15px;
text-align:center;
}

.nav a{
color:white;
text-decoration:none;
margin:15px;
font-weight:bold;
}
.hero img{
    width:100%;
    height:180px;
    object-fit:cover;
}
</style>

</head>

<body>

<div class="nav">

<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="addland.html">Add Land</a>
<a href="portfolio.html">Portfolio</a>

</div>
<div class="hero">
    <img src="https://images.unsplash.com/photo-1518843875459-f738682238a6?auto=format&fit=crop&w=1400&q=80">
</div>

<div class="container" id="landContainer">

</div>
<script>

const container = document.getElementById("landContainer");
const images = [
"https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=800&q=80",
"https://images.unsplash.com/photo-1464226184884-fa280b87c399?auto=format&fit=crop&w=800&q=80",
"https://images.unsplash.com/photo-1500937386664-56d1dfef3854?auto=format&fit=crop&w=800&q=80",
"https://images.unsplash.com/photo-1472396961693-142e6e269027?auto=format&fit=crop&w=800&q=80"
];
fetch("http://localhost:5000/lands")
.then(response => response.json())
.then(data => {

    console.log("DATA=", data);

    container.innerHTML = ""; 

    data.forEach((land) => {

container.innerHTML += `

<div class="card">

    <div class="card-content">

        <h3>📍 ${land.location}</h3>

        <p><b>👤 Owner:</b> ${land.owner}</p>

        <p><b>📍 Location:</b> ${land.location}</p>

        <p><b>🌾 Area:</b> ${land.acres} Acres</p>

        <p><b>💰 Rent:</b> ₹${land.cost}</p>

        <p><b>🌱 Soil Type:</b> ${land.soilType}</p>

        <p><b>💧 Water:</b> ${land.waterAvailability}</p>

        <p><b>📞 Contact:</b> ${land.contact}</p>

        <p><b>🚜 Suitable Crops:</b> Paddy, Maize, Vegetables</p>

        <p><b>📅 Status:</b> Available</p>

        <button class="btn"
onclick="window.location.href='rentland.html'">
Rent Land
</button>

    </div>

</div>

`;


});

}) 
.catch(error => {

    console.error(error);

    alert("Failed to Load Lands");

});

</script>
</body>
</html>
